<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add Recipe — Fascogris</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="/">Fascogris</a></h1>
    </header>
    <a href="/" class="back-link">← All Recipes</a>

    <div class="tabs">
      <button class="tab-btn active" data-tab="photo">Photo</button>
      <button class="tab-btn" data-tab="url">URL</button>
      <button class="tab-btn" data-tab="manual">Type</button>
    </div>

    <!-- Photo tab -->
    <div class="tab-panel active" id="tab-photo">
      <div class="form-group photo-input-wrap">
        <label>Take or upload a photo of a recipe</label>
        <input type="file" id="photo-input" accept="image/*" capture="environment">
      </div>
      <button class="btn btn-primary" id="photo-submit" disabled>Process Photo</button>
    </div>

    <!-- URL tab -->
    <div class="tab-panel" id="tab-url">
      <div class="form-group">
        <label>Paste a recipe URL</label>
        <input type="url" id="url-input" placeholder="https://...">
      </div>
      <button class="btn btn-primary" id="url-submit">Process URL</button>
    </div>

    <!-- Manual tab -->
    <div class="tab-panel" id="tab-manual">
      <form id="manual-form">
        <div class="form-group">
          <label>Title</label>
          <input type="text" name="title" required>
        </div>
        <div class="form-group">
          <label>Yield</label>
          <input type="text" name="yield" placeholder="e.g. 6 servings">
        </div>
        <div class="form-group">
          <label>Time</label>
          <input type="text" name="time" placeholder="e.g. 45 minutes">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea name="description" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>Ingredients (one per line)</label>
          <textarea name="ingredients" rows="8" required></textarea>
        </div>
        <div class="form-group">
          <label>Instructions (one step per line)</label>
          <textarea name="instructions" rows="8" required></textarea>
        </div>
        <div class="form-group">
          <label>Source</label>
          <input type="text" name="source" placeholder="Optional">
        </div>
        <button type="submit" class="btn btn-primary">Preview</button>
      </form>
    </div>

    <!-- Status -->
    <div id="status" class="status-msg" style="display:none"></div>

    <!-- Preview / Edit -->
    <div id="preview" style="display:none">
      <h3 style="margin:1rem 0 0.5rem">Preview & Edit</h3>
      <form class="preview-form" id="preview-form">
        <div class="form-group">
          <label>Title</label>
          <input type="text" name="title" required>
        </div>
        <div class="form-group">
          <label>Yield</label>
          <input type="text" name="yield">
        </div>
        <div class="form-group">
          <label>Time</label>
          <input type="text" name="time">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea name="description" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>Ingredients (one per line; use "## Group Name" for groups)</label>
          <textarea name="ingredients" rows="10" required></textarea>
        </div>
        <div class="form-group">
          <label>Instructions (one step per line; use "## Group Name" for groups)</label>
          <textarea name="instructions" rows="10" required></textarea>
        </div>
        <div class="form-group">
          <label>Source</label>
          <input type="text" name="source">
        </div>
        <button type="submit" class="btn btn-primary">Save Recipe</button>
        <button type="button" class="btn btn-secondary" id="cancel-preview" style="margin-left:0.5rem">Cancel</button>
      </form>
    </div>

    <nav class="footer-nav">
      <a href="/">Browse</a>
    </nav>
  </div>
  <script src="js/add.js"></script>
</body>
</html>
